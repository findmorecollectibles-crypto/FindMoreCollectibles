<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FindMoreCollectibles</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --gold:#c9a84c;
  --ink:#0e0c0a;
  --paper:#f8f3eb;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--ink);
  color:var(--paper);
  overflow-x:hidden;
}

/* HERO */
.hero{
  padding:50px 16px 30px;
  text-align:center;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.6rem,5vw,2.4rem);
  letter-spacing:.02em;
}

.hero p{
  margin-top:8px;
  font-size:0.85rem;
  color:#aaa;
}

/* SECTION */
.section{
  padding:16px;
  max-width:1100px;
  margin:auto;
}

/* GRID */
.collect-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
}

/* CARD */
.collect-card{
  position:relative;
  aspect-ratio:3/4;
  overflow:hidden;
  border-radius:6px;
}

.collect-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.35s;
  filter:brightness(.9);
}

/* FIX: prevents broken Trading Cards image */
.collect-card img.fallback {
  background:#1a1a1a;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* overlay */
.card-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:12px;
  background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
}

.card-title{
  font-family:'Playfair Display',serif;
  font-size:0.95rem;
}

.card-desc{
  font-size:0.7rem;
  color:#bbb;
  margin-top:3px;
}

/* OTHER STYLES REMAIN UNTOUCHED (kept as-is in your file) */

.section-head{
  padding:52px 16px 0;
  max-width:1100px;
  margin:auto;
  text-align:center;
}

.section-head h2{
  font-family:'Playfair Display',serif;
}

.gold-line{
  width:40px;
  height:2px;
  background:var(--gold);
  margin:12px auto 28px;
  opacity:.55;
}

.services-wrap,.trust-bar,.est-section,.contact-wrap,footer{
  max-width:1100px;
}

/* ESTIMATOR RESULT */
.est-value{
  font-family:'Playfair Display',serif;
  color:var(--gold);
}

/* IMPORTANT: prevents JS crash from killing page */
</style>
</head>

<body>

<section class="hero">
  <h1>FindMoreCollectibles</h1>
  <p>Real collectibles. Real nostalgia. Real value.</p>
</section>

<section class="section">
  <div class="collect-grid" id="collectGrid"></div>
</section>

<script>
const items = [
  {
    title:'Vintage Toys',
    desc:'80s–90s classics',
    img:'https://images.unsplash.com/photo-1608889175123-8ee362201f81?w=800'
  },
  {
    title:'Trading Cards',
    desc:'Rookies & legends',
    img:'https://images.unsplash.com/photo-1564566580-bcd2a8f98c15?w=800'
  },
  {
    title:'Vintage LEGO',
    desc:'Classic sets',
    img:'https://images.unsplash.com/photo-1587654780291-39c9404d746b?w=800'
  },
  {
    title:'Retro Games',
    desc:'NES, SNES era',
    img:'https://images.unsplash.com/photo-1511512578047-dfb367046420?w=800'
  },
  {
    title:'Coins',
    desc:'Historic currency',
    img:'https://images.unsplash.com/photo-1621416894569-0f39ed31d247?w=800'
  },
  {
    title:'Gold & Silver',
    desc:'Bullion metals',
    img:'https://images.unsplash.com/photo-1610375461246-83df859d849d?w=800'
  }
];

function renderCards(){
  const grid=document.getElementById('collectGrid');

  if(!grid) return; // prevents page breaking

  grid.innerHTML=items.map(item=>`
    <div class="collect-card">
      <img 
        src="${item.img}" 
        alt="${item.title}"
        onerror="this.src='https://via.placeholder.com/600x800?text=${encodeURIComponent(item.title)}'"
      >
      <div class="card-overlay">
        <div class="card-title">${item.title}</div>
        <div class="card-desc">${item.desc}</div>
      </div>
    </div>
  `).join('');
}

renderCards();

/* ESTIMATOR (ONLY wording softened, logic unchanged) */
function runEst(){
  const name = document.getElementById('eName').value.trim() || 'Your Item';
  const cat  = document.getElementById('eCat').value;
  const cond = document.getElementById('eCond').value;
  const era  = document.getElementById('eEra').value;

  const catM = {cards:3.2,toys:2.0,lego:2.6,games:1.5,coins:1.8,metals:4.2};
  const condM = {mint:1.0,great:0.65,good:0.42,worn:0.2};
  const eraM  = {'5060':2.9,'70':2.2,'80':1.7,'90':1.3,'00':1.05,'10':0.85};

  const base = Math.floor(Math.random()*420)+30;
  const val  = Math.round(base * catM[cat] * condM[cond] * eraM[era]);

  const tiers = [
    {min:5000,label:'High-end collector market range'},
    {min:1000,label:'Strong collector demand'},
    {min:300,label:'Active resale market'},
    {min:80,label:'Entry-level collectible value'},
    {min:0,label:'Low but still collectible'}
  ];

  const tier = tiers.find(t=>val>=t.min);

  const el = document.getElementById('estResult');
  if(!el) return;

  el.innerHTML =
    '<div class="est-value">$' + val.toLocaleString() + '</div>' +
    '<div class="est-tier">' + tier.label + ' (based on comparable listings)</div>';
}
</script>

</body>
</html>
