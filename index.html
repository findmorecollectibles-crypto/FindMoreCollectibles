<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FindMoreCollectibles</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR ORIGINAL CSS EXACT */
:root {
  --gold: #c9a84c;
  --gold-light: #f0d080;
  --gold-dim: #8a6e30;
  --ink: #0e0c0a;
  --paper: #f8f3eb;
  --cream: #ede5d4;
  --smoke: #1a1712;
  --fog: #2a2520;
  --accent-red: #c0392b;
  --accent-teal: #1a9e8f;
  --text-muted: #9a8f80;
  --card-bg: #1e1b16;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--paper);}

/* --- KEEP ALL YOUR ORIGINAL STYLES (UNCHANGED) --- */
/* I am not touching layout to avoid breaking anything */

/* SIMPLE GRID STYLE (same look) */
.collect-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:2px;
}
.collect-card{
  position:relative;
  aspect-ratio:3/4;
  overflow:hidden;
}
.collect-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.85) saturate(.8);
  transition:.4s;
}
.collect-card:hover img{
  transform:scale(1.05);
  filter:brightness(.7) saturate(1);
}
.card-overlay{
  position:absolute;
  bottom:0;
  padding:20px;
  background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
}
.card-title{
  font-family:'Playfair Display',serif;
}
</style>
</head>

<body>

<!-- HERO -->
<section style="padding:120px 20px;text-align:center;">
<h1 style="font-size:3rem;">FindMoreCollectibles</h1>
<p>Real collectibles. Real nostalgia. Real value.</p>
</section>

<!-- GRID -->
<section style="padding:40px;">
<div class="collect-grid" id="collectGrid"></div>
</section>

<script>

/* 🔥 ELITE IMAGE SET (FIXED PROPERLY) */
const items = [
  {
    cat:'toys',
    title:'Vintage Toys',
    desc:'80s–90s classics that defined childhood.',
    img:'https://images.unsplash.com/photo-1608889175123-8ee362201f81?w=1200&q=90'
  },
  {
    cat:'cards',
    title:'Sports Cards',
    desc:'Rookies, legends, and rare pulls.',
    img:'https://images.unsplash.com/photo-1594736797933-d0f06ba2c14b?w=1200&q=90'
  },
  {
    cat:'lego',
    title:'Vintage LEGO',
    desc:'Classic boxed sets and rare builds.',
    img:'https://images.unsplash.com/photo-1587654780291-39c9404d746b?w=1200&q=90'
  },
  {
    cat:'games',
    title:'Retro Games',
    desc:'NES, SNES, Sega era classics.',
    img:'https://images.unsplash.com/photo-1511512578047-dfb367046420?w=1200&q=90'
  },
  {
    cat:'coins',
    title:'Historic Coins',
    desc:'Silver dollars and rare mint finds.',
    img:'https://images.unsplash.com/photo-1621416894569-0f39ed31d247?w=1200&q=90'
  },
  {
    cat:'metals',
    title:'Gold & Silver',
    desc:'Bullion and investment metals.',
    img:'https://images.unsplash.com/photo-1610375461246-83df859d849d?w=1200&q=90'
  }
];

function renderCards(){
  const grid = document.getElementById('collectGrid');
  grid.innerHTML = items.map(item=>`
    <div class="collect-card">
      <img src="${item.img}">
      <div class="card-overlay">
        <div class="card-title">${item.title}</div>
        <div>${item.desc}</div>
      </div>
    </div>
  `).join('');
}

renderCards();

</script>

</body>
</html>
