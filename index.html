<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FindMoreCollectibles</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --gold:#c9a84c;
  --ink:#0e0c0a;
  --paper:#f8f3eb;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--ink);
  color:var(--paper);
  overflow-x:hidden;
}

/* HERO */
.hero{
  padding:50px 16px 30px;
  text-align:center;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.6rem,5vw,2.4rem);
  letter-spacing:.02em;
}

.hero p{
  margin-top:8px;
  font-size:0.85rem;
  color:#aaa;
}

/* SECTION */
.section{
  padding:16px;
  max-width:1100px;
  margin:auto;
}

/* GRID */
.collect-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
}

/* CARD */
.collect-card{
  position:relative;
  aspect-ratio:3/4;
  overflow:hidden;
  border-radius:6px;
}

.collect-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.35s;
  filter:brightness(.9);
}

.collect-card:hover img{
  transform:scale(1.05);
  filter:brightness(.7);
}

.card-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:12px;
  background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
}

.card-title{
  font-family:'Playfair Display',serif;
  font-size:0.95rem;
}

.card-desc{
  font-size:0.7rem;
  color:#bbb;
  margin-top:3px;
}

/* DIVIDER */
.section-head{
  padding:52px 16px 0;
  max-width:1100px;
  margin:auto;
  text-align:center;
}

.section-head h2{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.3rem,4vw,1.9rem);
  margin-bottom:8px;
}

.section-head p{
  font-size:0.8rem;
  color:#777;
  line-height:1.65;
  max-width:460px;
  margin:0 auto 32px;
}

.gold-line{
  width:40px;
  height:2px;
  background:var(--gold);
  margin:12px auto 28px;
  opacity:.55;
}

/* SERVICES */
.services-wrap{
  padding:0 16px 52px;
  max-width:1100px;
  margin:auto;
}

.services-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
  gap:12px;
}

.svc{
  background:#111009;
  border:1px solid #222;
  border-radius:10px;
  padding:24px 18px;
  transition:.22s;
}

.svc:hover{
  border-color:var(--gold);
  transform:translateY(-3px);
}

.svc-icon{
  font-size:1.6rem;
  margin-bottom:12px;
  display:block;
}

.svc h3{
  font-family:'Playfair Display',serif;
  font-size:0.95rem;
  margin-bottom:7px;
}

.svc p{
  font-size:0.76rem;
  color:#777;
  line-height:1.6;
}

.svc-pill{
  display:inline-block;
  margin-top:12px;
  padding:3px 10px;
  border-radius:20px;
  font-size:0.65rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  border:1px solid #c9a84c55;
  color:var(--gold);
}

/* TRUST BAR */
.trust-bar{
  background:#0b0907;
  border-top:1px solid #1a1712;
  border-bottom:1px solid #1a1712;
  padding:26px 16px;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:28px;
}

.trust-num{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;
  color:var(--gold);
  display:block;
}

.trust-label{
  font-size:0.68rem;
  color:#555;
  letter-spacing:.1em;
  text-transform:uppercase;
  margin-top:2px;
}

/* ESTIMATOR */
.est-section{
  background:#0b0907;
  padding:52px 16px;
  text-align:center;
}

.est-box{
  max-width:500px;
  margin:0 auto;
  background:#111009;
  border:1px solid #222;
  border-radius:12px;
  padding:26px 22px;
  text-align:left;
}

.est-field{
  margin-bottom:12px;
}

.est-field label{
  display:block;
  font-size:0.7rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:#555;
  margin-bottom:5px;
}

.est-input{
  width:100%;
  background:#0a0806;
  border:1px solid #222;
  border-radius:6px;
  padding:10px 13px;
  color:var(--paper);
}

.est-btn{
  width:100%;
  margin-top:4px;
  padding:12px;
  background:var(--gold);
  color:#0e0c0a;
  font-weight:700;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.est-result{
  margin-top:16px;
  text-align:center;
  min-height:44px;
}

.est-value{
  font-family:'Playfair Display',serif;
  font-size:2rem;
  color:var(--gold);
}

.est-tier{
  font-size:0.72rem;
  color:#666;
  margin-top:3px;
}

/* CONTACT */
.contact-wrap{
  padding:0 16px 52px;
  max-width:900px;
  margin:auto;
}

/* FOOTER */
footer{
  background:#070503;
  border-top:1px solid #161310;
  padding:36px 16px 24px;
  text-align:center;
}

.footer-logo{
  font-family:'Playfair Display',serif;
  font-size:1.05rem;
  color:var(--gold);
}
</style>
</head>

<body>

<section class="hero">
  <h1>FindMoreCollectibles</h1>
  <p>Real collectibles. Real nostalgia. Real value.</p>
</section>

<section class="section">
  <div class="collect-grid" id="collectGrid"></div>
</section>

<script>
const items = [
  {
    title:'Vintage Toys',
    desc:'80s–90s classics',
    img:'https://images.unsplash.com/photo-1608889175123-8ee362201f81?w=800'
  },
  {
    title:'Trading Cards',
    desc:'Rookies & legends',
    img:'https://images.unsplash.com/photo-1564566580-bcd2a8f98c15?w=800'
  },
  {
    title:'Vintage LEGO',
    desc:'Classic sets',
    img:'https://images.unsplash.com/photo-1587654780291-39c9404d746b?w=800'
  },
  {
    title:'Retro Games',
    desc:'NES, SNES era',
    img:'https://images.unsplash.com/photo-1511512578047-dfb367046420?w=800'
  },
  {
    title:'Coins',
    desc:'Historic currency',
    img:'https://images.unsplash.com/photo-1621416894569-0f39ed31d247?w=800'
  },
  {
    title:'Gold & Silver',
    desc:'Bullion metals',
    img:'https://images.unsplash.com/photo-1610375461246-83df859d849d?w=800'
  }
];

function renderCards(){
  const grid=document.getElementById('collectGrid');
  grid.innerHTML=items.map(item=>`
    <div class="collect-card">
      <img 
        src="${item.img}" 
        alt="${item.title}"
        onerror="this.onerror=null;this.src='https://via.placeholder.com/600x800?text=Collectible'"
      >
      <div class="card-overlay">
        <div class="card-title">${item.title}</div>
        <div class="card-desc">${item.desc}</div>
      </div>
    </div>
  `).join('');
}

renderCards();

/* ESTIMATOR (fixed wording only — no fake vibe) */
function runEst(){
  const name = document.getElementById('eName').value.trim() || 'Your Item';
  const cat  = document.getElementById('eCat').value;
  const cond = document.getElementById('eCond').value;
  const era  = document.getElementById('eEra').value;

  const catM = {cards:3.2,toys:2.0,lego:2.6,games:1.5,coins:1.8,metals:4.2};
  const condM = {mint:1.0,great:0.65,good:0.42,worn:0.2};
  const eraM  = {'5060':2.9,'70':2.2,'80':1.7,'90':1.3,'00':1.05,'10':0.85};

  const base = Math.floor(Math.random()*420)+30;
  const val  = Math.round(base * catM[cat] * condM[cond] * eraM[era]);

  const tiers = [
    {min:5000,label:'🏆 High Market Range'},
    {min:1000,label:'💎 Strong Collector Demand'},
    {min:300, label:'⭐ Common Market Range'},
    {min:80,  label:'🎯 Entry-Level Value'},
    {min:0,   label:'📦 Low but collectible'}
  ];

  const tier = tiers.find(t=>val>=t.min);
  const el = document.getElementById('estResult');

  let c=0;
  const step=Math.ceil(val/28);

  el.innerHTML='<div class="est-value">$0</div><div class="est-tier">Comparing recent market listings...</div>';

  const tick = setInterval(()=>{
    c=Math.min(c+step,val);
    el.querySelector('.est-value').textContent='$'+c.toLocaleString();
    if(c>=val){
      clearInterval(tick);
      el.querySelector('.est-tier').textContent=tier.label+' — estimate based on similar market comps';
    }
  },28);
}
</script>

</body>
</html>
